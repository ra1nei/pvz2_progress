<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1240" viewBox="0 0 1040 1240" role="img" aria-labelledby="t d">
<title id="t">Adding a mod the tracker has never seen, branch by branch</title>
<desc id="d">A flowchart of the new-mod path: install the mod yourself, run addmod.py to count and name it, run install.py scan to find its APK and OBB, drop in a logo, commit. The three things that cannot be worked out automatically are marked.</desc>
<style>
  .bg   { fill: #ffffff; }
  .box  { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
  .cmdb { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1.4; }
  .okb  { fill: #dafbe1; stroke: #4ac26b; stroke-width: 1; }
  .warnb{ fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
  .stopb{ fill: #ffebe9; stroke: #ff8182; stroke-width: 1; }
  .noteb{ fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; stroke-dasharray: 4 3; }
  .deci { fill: #fbefff; stroke: #c297ff; stroke-width: 1.2; }
  .h    { fill: #1f2328; font: 600 13px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .s    { fill: #59636e; font: 400 11px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .cmd  { fill: #1f2328; font: 600 12.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
  .mono { fill: #59636e; font: 400 10.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
  .edge { stroke: #8c959f; stroke-width: 1.5; fill: none; }
  .ah   { stroke: #8c959f; fill: none; }
  .elbl { fill: #1f2328; font: 500 10.5px -apple-system, "Segoe UI", sans-serif; }
  .sect { fill: #1f2328; font: 700 15px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .cap  { fill: #59636e; font: italic 400 11px -apple-system, "Segoe UI", sans-serif; }
  @media (prefers-color-scheme: dark) {
    .bg   { fill: #0d1117; }
    .box  { fill: #161b22; stroke: #30363d; }
    .cmdb { fill: #121d2f; stroke: #1f6feb; }
    .okb  { fill: #12261e; stroke: #238636; }
    .warnb{ fill: #272115; stroke: #9e6a03; }
    .stopb{ fill: #25171c; stroke: #f85149; }
    .noteb{ fill: #161b22; stroke: #30363d; }
    .deci { fill: #21162d; stroke: #8957e5; }
    .h    { fill: #e6edf3; }
    .s    { fill: #8b949e; }
    .cmd  { fill: #e6edf3; }
    .mono { fill: #8b949e; }
    .edge { stroke: #6e7681; }
    .ah   { stroke: #6e7681; }
    .elbl { fill: #e6edf3; }
    .sect { fill: #e6edf3; }
    .cap  { fill: #8b949e; }
  }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path class="ah" d="M2 1L8 5L2 9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="bg" width="1040" height="1240"/>
<text class="sect" x="20" y="34">Adding a mod nothing here knows about</text>
<text class="cap" x="20" y="54" text-anchor="start">Done once per mod, on the machine that has it. Boxes marked BY HAND are the only typing involved.</text>
<rect class="warnb" x="305" y="72" width="290" height="56" rx="6"/>
<text class="h" x="450.0" y="96.2" text-anchor="middle">BY HAND: install the mod</text>
<text class="s" x="450.0" y="111.8" text-anchor="middle">however its author publishes it</text>
<rect class="deci" x="305" y="164" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="194.0" text-anchor="middle">did the OBB land too?</text>
<rect class="stopb" x="655" y="165" width="265" height="50" rx="6"/>
<text class="mono" x="787.5" y="178.5" text-anchor="middle">No OBB for ... on device</text>
<text class="s" x="787.5" y="194.0" text-anchor="middle">an APK alone cannot start,</text>
<text class="s" x="787.5" y="209.5" text-anchor="middle">and there is nothing to count</text>
<rect class="cmdb" x="325" y="266" width="250" height="56" rx="6"/>
<text class="cmd" x="450.0" y="290.2" text-anchor="middle">addmod.py &lt;pkg&gt;</text>
<text class="cmd" x="450.0" y="305.8" text-anchor="middle">--link &lt;download page&gt;</text>
<rect class="deci" x="305" y="358" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="388.0" text-anchor="middle">where does the name come from?</text>
<rect class="box" x="655" y="314" width="265" height="44" rx="6"/>
<text class="mono" x="787.5" y="332.2" text-anchor="middle">--name &quot;...&quot;</text>
<text class="s" x="787.5" y="347.8" text-anchor="middle">wins over everything else</text>
<rect class="box" x="655" y="372" width="265" height="44" rx="6"/>
<text class="s" x="787.5" y="390.2" text-anchor="middle">a mod already in NAME_MAP</text>
<text class="s" x="787.5" y="405.8" text-anchor="middle">keeps the name it had</text>
<rect class="stopb" x="655" y="427" width="265" height="50" rx="6"/>
<text class="h" x="787.5" y="440.5" text-anchor="middle">STOP: no name</text>
<text class="s" x="787.5" y="456.0" text-anchor="middle">aapt2 missing, or the mod is not</text>
<text class="s" x="787.5" y="471.5" text-anchor="middle">installed. Rerun with --name.</text>
<rect class="box" x="325" y="452" width="250" height="50" rx="6"/>
<text class="h" x="450.0" y="473.2" text-anchor="middle">reads the APK label</text>
<text class="s" x="450.0" y="488.8" text-anchor="middle">PvZ2 Addendum becomes Addendum</text>
<rect class="deci" x="305" y="542" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="572.0" text-anchor="middle">does the APK carry an OBB URL?</text>
<rect class="box" x="655" y="545" width="265" height="46" rx="6"/>
<text class="s" x="787.5" y="564.2" text-anchor="middle">counts over the network,</text>
<text class="s" x="787.5" y="579.8" text-anchor="middle">a few MB by HTTP Range</text>
<rect class="box" x="325" y="634" width="250" height="48" rx="6"/>
<text class="s" x="450.0" y="662.0" text-anchor="middle">counts off the device, over adb</text>
<rect class="okb" x="325" y="710" width="250" height="50" rx="6"/>
<text class="h" x="450.0" y="731.2" text-anchor="middle">writes worlds/&lt;pkg&gt;.json</text>
<text class="s" x="450.0" y="746.8" text-anchor="middle">the level count, and the mod name</text>
<rect class="deci" x="305" y="796" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="826.0" text-anchor="middle">was --link given?</text>
<rect class="warnb" x="655" y="794" width="265" height="56" rx="6"/>
<text class="h" x="787.5" y="810.5" text-anchor="middle">BY HAND: links.json</text>
<text class="s" x="787.5" y="826.0" text-anchor="middle">nothing on the device says where</text>
<text class="s" x="787.5" y="841.5" text-anchor="middle">the mod came from, so nothing can guess</text>
<rect class="cmdb" x="325" y="888" width="250" height="50" rx="6"/>
<text class="cmd" x="450.0" y="917.0" text-anchor="middle">install.py scan</text>
<rect class="deci" x="305" y="966" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="996.0" text-anchor="middle">how many APKs in that folder?</text>
<rect class="warnb" x="655" y="919" width="265" height="50" rx="6"/>
<text class="mono" x="787.5" y="932.5" text-anchor="middle">no APK in the folder</text>
<text class="s" x="787.5" y="948.0" text-anchor="middle">not a Drive folder, or filed oddly:</text>
<text class="s" x="787.5" y="963.5" text-anchor="middle">paste apk_url into install.json</text>
<rect class="box" x="655" y="991" width="265" height="50" rx="6"/>
<text class="h" x="787.5" y="1004.5" text-anchor="middle">more than one</text>
<text class="mono" x="787.5" y="1020.0" text-anchor="middle">install.py pick &lt;mod&gt; &quot;60_FPS&quot;</text>
<text class="s" x="787.5" y="1035.5" text-anchor="middle">it will not choose for you</text>
<rect class="warnb" x="325" y="1052" width="250" height="56" rx="6"/>
<text class="h" x="450.0" y="1076.2" text-anchor="middle">BY HAND: the logo</text>
<text class="mono" x="450.0" y="1091.8" text-anchor="middle">assets/logo/&lt;sfx&gt;.png</text>
<rect class="okb" x="305" y="1144" width="290" height="50" rx="6"/>
<text class="h" x="450.0" y="1165.2" text-anchor="middle">commit, and it is in the table</text>
<text class="s" x="450.0" y="1180.8" text-anchor="middle">links, install, sources, worlds, logo</text>
<path class="edge" d="M450.0 128 L450.0 162" marker-end="url(#a)"/>
<path class="edge" d="M595 190.0 L653 190.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="183.0" text-anchor="middle">no</text>
<path class="edge" d="M450.0 216 L450.0 264" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="232.5" text-anchor="middle">yes</text>
<path class="edge" d="M450.0 322 L450.0 356" marker-end="url(#a)"/>
<path class="edge" d="M595 384.0 L653 336.0" marker-end="url(#a)"/>
<path class="edge" d="M595 384 L625 384 L625 394 L653 394" marker-end="url(#a)"/>
<path class="edge" d="M450.0 410 L450.0 450" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="424.5" text-anchor="middle">neither</text>
<path class="edge" d="M575 477.0 L653 452.0" marker-end="url(#a)"/>
<text class="elbl" x="615.0" y="470.0" text-anchor="middle">fails</text>
<path class="edge" d="M450.0 502 L450.0 540" marker-end="url(#a)"/>
<path class="edge" d="M595 568.0 L653 568.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="561.0" text-anchor="middle">yes</text>
<path class="edge" d="M450.0 594 L450.0 632" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="608.0" text-anchor="middle">no</text>
<path class="edge" d="M450.0 682 L450.0 708" marker-end="url(#a)"/>
<path class="edge" d="M920 568 L972 568 L972 690 L450 690 L450 708" marker-end="url(#a)"/>
<path class="edge" d="M450.0 760 L450.0 794" marker-end="url(#a)"/>
<path class="edge" d="M595 822.0 L653 822.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="815.0" text-anchor="middle">no</text>
<path class="edge" d="M450.0 848 L450.0 886" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="862.0" text-anchor="middle">yes, links.json is written for you</text>
<path class="edge" d="M450.0 938 L450.0 964" marker-end="url(#a)"/>
<path class="edge" d="M595 992.0 L653 944.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="985.0" text-anchor="middle">none</text>
<path class="edge" d="M595 992 L625 992 L625 1016 L653 1016" marker-end="url(#a)"/>
<path class="edge" d="M450.0 1018 L450.0 1050" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="1030.5" text-anchor="middle">exactly one, taken</text>
<path class="edge" d="M450.0 1108 L450.0 1142" marker-end="url(#a)"/>
<path class="edge" d="M920 850 L972 850 L972 872 L452 872" marker-end="url(#a)" stroke-dasharray="4 3"/>
<text class="elbl" x="966" y="866" text-anchor="end">once you add it</text>
<rect class="noteb" x="20" y="266" width="220" height="116" rx="6"/>
<text class="h" x="130.0" y="289.2" text-anchor="middle">The one thing to type</text>
<text class="s" x="130.0" y="304.8" text-anchor="middle">The download page. The package name</text>
<text class="s" x="130.0" y="320.2" text-anchor="middle">gives no page, and an APK carries a</text>
<text class="s" x="130.0" y="335.8" text-anchor="middle">URL only when the mod ships a</text>
<text class="s" x="130.0" y="351.2" text-anchor="middle">downloader, which is why Collided</text>
<text class="s" x="130.0" y="366.8" text-anchor="middle">fills its own in and Solstice cannot.</text>
<rect class="noteb" x="20" y="542" width="220" height="100" rx="6"/>
<text class="h" x="130.0" y="565.0" text-anchor="middle">Why two ways to count</text>
<text class="s" x="130.0" y="580.5" text-anchor="middle">A URL means later runs can re-read</text>
<text class="s" x="130.0" y="596.0" text-anchor="middle">the count on their own, with no</text>
<text class="s" x="130.0" y="611.5" text-anchor="middle">device. Without one the count is</text>
<text class="s" x="130.0" y="627.0" text-anchor="middle">frozen until you rebuild it here.</text>
<rect class="noteb" x="20" y="796" width="220" height="100" rx="6"/>
<text class="h" x="130.0" y="819.0" text-anchor="middle">Skipping --link is survivable</text>
<text class="s" x="130.0" y="834.5" text-anchor="middle">The mod is still counted and still</text>
<text class="s" x="130.0" y="850.0" text-anchor="middle">appears. What breaks is fetching it:</text>
<text class="s" x="130.0" y="865.5" text-anchor="middle">install.py on another machine has</text>
<text class="s" x="130.0" y="881.0" text-anchor="middle">nowhere to look.</text>
<rect class="noteb" x="20" y="1044" width="220" height="84" rx="6"/>
<text class="h" x="130.0" y="1059.0" text-anchor="middle">And the logo</text>
<text class="s" x="130.0" y="1074.5" text-anchor="middle">PNG, WebP or JPG, named after the</text>
<text class="s" x="130.0" y="1090.0" text-anchor="middle">package suffix. Nothing goes looking</text>
<text class="s" x="130.0" y="1105.5" text-anchor="middle">for one, so it is that file or an</text>
<text class="s" x="130.0" y="1121.0" text-anchor="middle">empty first column.</text>
<text class="cap" x="520.0" y="1222" text-anchor="middle">Run addmod.py with no arguments and it picks up every uncounted mod at once, then lists what is left to do.</text>
</svg>
