<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1220" viewBox="0 0 1040 1220" role="img" aria-labelledby="t d">
<title id="t">What sync.py play does, branch by branch</title>
<desc id="d">A flowchart of sync.py play: it connects to the emulator, copies the newest saves onto it, then watches the foreground and uploads each mod&#x27;s save on a half-hour timer and once at the end. Every refusal notes on the left explaining why each guard exists.</desc>
<style>
  .bg   { fill: #ffffff; }
  .box  { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
  .cmdb { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1.4; }
  .okb  { fill: #dafbe1; stroke: #4ac26b; stroke-width: 1; }
  .warnb{ fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
  .stopb{ fill: #ffebe9; stroke: #ff8182; stroke-width: 1; }
  .noteb{ fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; stroke-dasharray: 4 3; }
  .deci { fill: #fbefff; stroke: #c297ff; stroke-width: 1.2; }
  .h    { fill: #1f2328; font: 600 13px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .s    { fill: #59636e; font: 400 11px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .cmd  { fill: #1f2328; font: 600 12.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
  .mono { fill: #59636e; font: 400 10.5px ui-monospace, SFMono-Regular, Menlo, monospace; }
  .edge { stroke: #8c959f; stroke-width: 1.5; fill: none; }
  .ah   { stroke: #8c959f; fill: none; }
  .elbl { fill: #1f2328; font: 500 10.5px -apple-system, "Segoe UI", sans-serif; }
  .sect { fill: #1f2328; font: 700 15px -apple-system, "Segoe UI", Roboto, sans-serif; }
  .cap  { fill: #59636e; font: italic 400 11px -apple-system, "Segoe UI", sans-serif; }
  @media (prefers-color-scheme: dark) {
    .bg   { fill: #0d1117; }
    .box  { fill: #161b22; stroke: #30363d; }
    .cmdb { fill: #121d2f; stroke: #1f6feb; }
    .okb  { fill: #12261e; stroke: #238636; }
    .warnb{ fill: #272115; stroke: #9e6a03; }
    .stopb{ fill: #25171c; stroke: #f85149; }
    .noteb{ fill: #161b22; stroke: #30363d; }
    .deci { fill: #21162d; stroke: #8957e5; }
    .h    { fill: #e6edf3; }
    .s    { fill: #8b949e; }
    .cmd  { fill: #e6edf3; }
    .mono { fill: #8b949e; }
    .edge { stroke: #6e7681; }
    .ah   { stroke: #6e7681; }
    .elbl { fill: #e6edf3; }
    .sect { fill: #e6edf3; }
    .cap  { fill: #8b949e; }
  }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path class="ah" d="M2 1L8 5L2 9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="bg" width="1040" height="1220"/>
<text class="sect" x="20" y="34">python3 sync.py play</text>
<text class="cap" x="20" y="54" text-anchor="start">The daily one. Follow the spine down the middle; every branch peels off to the right.</text>
<rect class="cmdb" x="325" y="72" width="250" height="44" rx="6"/>
<text class="cmd" x="450.0" y="98.0" text-anchor="middle">sync.py play</text>
<rect class="deci" x="305" y="148" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="170.2" text-anchor="middle">is the emulator up?</text>
<text class="s" x="450.0" y="185.8" text-anchor="middle">adb devices, then the usual ports</text>
<rect class="box" x="655" y="148" width="265" height="52" rx="6"/>
<text class="s" x="787.5" y="170.2" text-anchor="middle">starts it and waits, up to</text>
<text class="s" x="787.5" y="185.8" text-anchor="middle">150 seconds, then gives up</text>
<rect class="stopb" x="655" y="232" width="265" height="46" rx="6"/>
<text class="h" x="787.5" y="251.2" text-anchor="middle">STOP</text>
<text class="mono" x="787.5" y="266.8" text-anchor="middle">never showed up in adb</text>
<rect class="box" x="325" y="330" width="250" height="52" rx="6"/>
<text class="h" x="450.0" y="352.2" text-anchor="middle">pull: saves/ onto the device</text>
<text class="s" x="450.0" y="367.8" text-anchor="middle">one mod at a time</text>
<rect class="deci" x="305" y="422" width="290" height="52" rx="14"/>
<text class="h" x="450.0" y="444.2" text-anchor="middle">for this mod, which case?</text>
<text class="s" x="450.0" y="459.8" text-anchor="middle">compares cleared levels both ways</text>
<rect class="box" x="655" y="377" width="265" height="46" rx="6"/>
<text class="mono" x="787.5" y="396.2" text-anchor="middle">not in saves/ yet</text>
<text class="s" x="787.5" y="411.8" text-anchor="middle">leaves the device copy alone</text>
<rect class="warnb" x="655" y="434" width="265" height="56" rx="6"/>
<text class="mono" x="787.5" y="450.5" text-anchor="middle">KEPT</text>
<text class="s" x="787.5" y="466.0" text-anchor="middle">the device holds MORE progress,</text>
<text class="s" x="787.5" y="481.5" text-anchor="middle">so it is not overwritten</text>
<rect class="stopb" x="655" y="509" width="265" height="50" rx="6"/>
<text class="h" x="787.5" y="530.2" text-anchor="middle">STOP: adb push failed</text>
<text class="s" x="787.5" y="545.8" text-anchor="middle">playing now would use an old save</text>
<rect class="okb" x="325" y="524" width="250" height="42" rx="6"/>
<text class="s" x="450.0" y="549.0" text-anchor="middle">N cleared -&gt; device</text>
<rect class="box" x="305" y="600" width="290" height="56" rx="6"/>
<text class="h" x="450.0" y="624.2" text-anchor="middle">watch the foreground</text>
<text class="s" x="450.0" y="639.8" text-anchor="middle">copy the open mod every 8 seconds</text>
<rect class="deci" x="305" y="688" width="290" height="48" rx="14"/>
<text class="h" x="450.0" y="716.0" text-anchor="middle">emulator still up?</text>
<rect class="box" x="655" y="660" width="265" height="56" rx="6"/>
<text class="h" x="787.5" y="676.5" text-anchor="middle">closed, or Ctrl-C</text>
<text class="s" x="787.5" y="692.0" text-anchor="middle">the session is ending, so</text>
<text class="s" x="787.5" y="707.5" text-anchor="middle">this is the last push</text>
<rect class="deci" x="305" y="776" width="290" height="48" rx="14"/>
<text class="h" x="450.0" y="804.0" text-anchor="middle">30 minutes since the last push?</text>
<rect class="box" x="305" y="864" width="290" height="56" rx="6"/>
<text class="h" x="450.0" y="880.5" text-anchor="middle">push what moved</text>
<text class="s" x="450.0" y="896.0" text-anchor="middle">one commit for the batch, from the</text>
<text class="s" x="450.0" y="911.5" text-anchor="middle">device or the copies held on close</text>
<rect class="box" x="655" y="824" width="265" height="44" rx="6"/>
<text class="mono" x="787.5" y="842.2" text-anchor="middle">unchanged</text>
<text class="s" x="787.5" y="857.8" text-anchor="middle">nothing moved, no commit</text>
<rect class="stopb" x="655" y="878" width="265" height="56" rx="6"/>
<text class="mono" x="787.5" y="894.5" text-anchor="middle">REFUSED</text>
<text class="s" x="787.5" y="910.0" text-anchor="middle">the device holds LESS than saves/,</text>
<text class="s" x="787.5" y="925.5" text-anchor="middle">so this machine is on an old save</text>
<rect class="box" x="325" y="956" width="250" height="46" rx="6"/>
<text class="h" x="450.0" y="975.2" text-anchor="middle">commit and push saves/</text>
<text class="s" x="450.0" y="990.8" text-anchor="middle">a failed push is survived</text>
<rect class="okb" x="305" y="1038" width="290" height="50" rx="6"/>
<text class="h" x="450.0" y="1059.2" text-anchor="middle">the workflow rebuilds the table</text>
<text class="s" x="450.0" y="1074.8" text-anchor="middle">a minute or two later</text>
<path class="edge" d="M450.0 116 L450.0 146" marker-end="url(#a)"/>
<path class="edge" d="M595 174.0 L653 174.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="167.0" text-anchor="middle">no</text>
<path class="edge" d="M787.5 200 L787.5 230" marker-end="url(#a)"/>
<text class="elbl" x="795.5" y="212.0" text-anchor="middle">still nothing</text>
<path class="edge" d="M450.0 200 L450.0 328" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="236.5" text-anchor="middle">yes</text>
<path class="edge" d="M920 174 L972 174 L972 306 L450 306 L450 328" marker-end="url(#a)"/>
<text class="elbl" x="960" y="300" text-anchor="end">once it appears</text>
<path class="edge" d="M450.0 382 L450.0 420" marker-end="url(#a)"/>
<path class="edge" d="M595 448.0 L653 400.0" marker-end="url(#a)"/>
<path class="edge" d="M595 448 L625 448 L625 462 L653 462" marker-end="url(#a)"/>
<path class="edge" d="M625 448 L625 534 L653 534" marker-end="url(#a)"/>
<path class="edge" d="M450.0 474 L450.0 522" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="490.5" text-anchor="middle">saves/ is newer, the normal case</text>
<path class="edge" d="M450.0 566 L450.0 598" marker-end="url(#a)"/>
<path class="edge" d="M450.0 656 L450.0 686" marker-end="url(#a)"/>
<path class="edge" d="M595 712.0 L653 688.0" marker-end="url(#a)"/>
<text class="elbl" x="625.0" y="705.0" text-anchor="middle">no</text>
<path class="edge" d="M450.0 736 L450.0 774" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="750.0" text-anchor="middle">yes</text>
<path class="edge" d="M450.0 824 L450.0 862" marker-end="url(#a)"/>
<text class="elbl" x="458.0" y="838.0" text-anchor="middle">yes, time to</text>
<path class="edge" d="M920 688 L972 688 L972 886 L597 886" marker-end="url(#a)"/>
<text class="elbl" x="966" y="780" text-anchor="end">push once more</text>
<path class="edge" d="M595 892.0 L653 846.0" marker-end="url(#a)"/>
<path class="edge" d="M595 892 L625 892 L625 934 L653 934" marker-end="url(#a)"/>
<path class="edge" d="M450.0 920 L450.0 954" marker-end="url(#a)"/>
<path class="edge" d="M450.0 1002 L450.0 1036" marker-end="url(#a)"/>
<path class="edge" d="M305 800 L272 800 L272 628 L305 628" marker-end="url(#a)" stroke-dasharray="4 3"/>
<text class="elbl" x="280" y="715" text-anchor="start">no, keep watching</text>
<rect class="noteb" x="20" y="148" width="220" height="100" rx="6"/>
<text class="h" x="130.0" y="171.0" text-anchor="middle">Why it pulls first</text>
<text class="s" x="130.0" y="186.5" text-anchor="middle">Play on a stale save and the next</text>
<text class="s" x="130.0" y="202.0" text-anchor="middle">push erases the other machine, with</text>
<text class="s" x="130.0" y="217.5" text-anchor="middle">no warning. So it refuses to start</text>
<text class="s" x="130.0" y="233.0" text-anchor="middle">the emulator if the pull failed.</text>
<rect class="noteb" x="20" y="400" width="220" height="116" rx="6"/>
<text class="h" x="130.0" y="423.2" text-anchor="middle">Why the two guards differ</text>
<text class="s" x="130.0" y="438.8" text-anchor="middle">KEPT is not an error. The device</text>
<text class="s" x="130.0" y="454.2" text-anchor="middle">copy is the newer one, so the session</text>
<text class="s" x="130.0" y="469.8" text-anchor="middle">goes ahead and the watch loop sends</text>
<text class="s" x="130.0" y="485.2" text-anchor="middle">it up later. Only the overwrite is</text>
<text class="s" x="130.0" y="500.8" text-anchor="middle">skipped. Both answer to --force.</text>
<rect class="noteb" x="20" y="600" width="220" height="116" rx="6"/>
<text class="h" x="130.0" y="623.2" text-anchor="middle">Foreground, not process</text>
<text class="s" x="130.0" y="638.8" text-anchor="middle">Android keeps a game alive long</text>
<text class="s" x="130.0" y="654.2" text-anchor="middle">after you leave it, so a dead</text>
<text class="s" x="130.0" y="669.8" text-anchor="middle">process never arrives. The copy</text>
<text class="s" x="130.0" y="685.2" text-anchor="middle">each pass is what the closing</text>
<text class="s" x="130.0" y="700.8" text-anchor="middle">push commits, the device by then gone.</text>
<rect class="noteb" x="20" y="856" width="220" height="116" rx="6"/>
<text class="h" x="130.0" y="879.2" text-anchor="middle">Why on a timer</text>
<text class="s" x="130.0" y="894.8" text-anchor="middle">Pushing every time a mod left the</text>
<text class="s" x="130.0" y="910.2" text-anchor="middle">foreground put a commit in the log</text>
<text class="s" x="130.0" y="925.8" text-anchor="middle">for every glance at a pinata. One</text>
<text class="s" x="130.0" y="941.2" text-anchor="middle">push every half hour sweeps it all</text>
<text class="s" x="130.0" y="956.8" text-anchor="middle">into a single commit instead.</text>
<text class="cap" x="520.0" y="1202" text-anchor="middle">Never run sync.py pull with a mod already open: the game writes its save on exit and would wipe what you just fetched.</text>
</svg>
