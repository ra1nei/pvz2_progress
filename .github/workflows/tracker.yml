name: PvZ2 progress tracker

# Rebuilds the progress table. Saves come from saves/ in this repo, level
# counts from each mod's OBB over HTTP Range, and the result is committed back
# here. Use "Run workflow" on the Actions tab to trigger it by hand.
on:
  # A pushed save is a finished session, so rebuild the table right then.
  # Scoped to saves/ on purpose: this workflow commits README.md and state.json
  # itself, and a broader filter would make it retrigger itself forever.
  push:
    paths:
      - 'saves/**'
  schedule:
    - cron: '17 */6 * * *'      # minute 17 to dodge GitHub's peak load
  workflow_dispatch:

permissions:
  contents: write               # to commit state.json, worlds/, pvz_totals.json

concurrency:
  group: pvz2-tracker
  cancel-in-progress: false     # never cut a run short and leave state half-written

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install zstd
        # Only needed for mods whose OBB uses zstd (Reflourished). zlib mods
        # work with the standard library alone.
        run: pip install --quiet zstandard

      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ github.token }}   # raises the API limit to 5000/hour
        run: python3 track.py

      - name: Commit results
        run: |
          # The runner is disposable. Without a commit the next run loses its
          # comparison baseline and the README never updates.
          git config user.name  "pvz2-tracker[bot]"
          git config user.email "pvz2-tracker@users.noreply.github.com"
          git add -A state.json worlds pvz_totals.json README.md assets 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing changed"
          else
            git commit -m "tracker: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
